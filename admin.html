<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Portfolio Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050b14;
            color: #f0f6ff;
            font-family: 'Outfit', sans-serif;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00e6ff; margin-bottom: 30px; }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #0a1628;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0,230,255,0.2);
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #050b14;
            border: 1px solid #2a3a55;
            color: white;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
        }
        button {
            background: #00e6ff;
            color: #050b14;
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,230,255,0.3);
        }
        .project-card {
            background: #0a1628;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #2a3a55;
            transition: transform 0.2s;
        }
        .project-card:hover {
            transform: translateX(5px);
            border-color: rgba(0,230,255,0.4);
        }
        .form-section {
            background: #0a1628;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            border: 1px solid rgba(0,230,255,0.2);
        }
        .delete-btn { background: #ff4444; color: white; }
        .edit-btn { background: #ffa500; color: #050b14; }
        .back-link { 
            color: #00e6ff; 
            text-decoration: none; 
            display: inline-block; 
            margin-bottom: 20px;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #0a1628;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0,230,255,0.2);
        }
        .stat-card h3 {
            font-size: 2rem;
            color: #00e6ff;
        }
        .stat-card p {
            color: #7a9bb5;
            margin-top: 5px;
        }
        h3 {
            margin-bottom: 15px;
            color: #00e6ff;
        }
        .success-msg {
            background: #00cc88;
            color: #050b14;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #7a9bb5;
            font-size: 0.9rem;
        }
        textarea {
            resize: vertical;
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Back to Portfolio</a>
    <h1><i class="fas fa-cog"></i> Admin Dashboard</h1>
    
    <div id="loginSection"></div>
    <div id="adminContent" style="display: none;"></div>
</div>

<script>
const ADMIN_PASSWORD = 'admin123'; // Change this to your preferred password

let projects = [];

function checkAuth() {
    if (sessionStorage.getItem('admin_logged_in') === 'true') {
        document.getElementById('loginSection').innerHTML = '';
        document.getElementById('adminContent').style.display = 'block';
        loadProjects();
    } else {
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('loginSection').innerHTML = `
            <div class="login-box">
                <i class="fas fa-lock" style="font-size: 3rem; color: #00e6ff; margin-bottom: 20px;"></i>
                <h2>Admin Login</h2>
                <p style="color: #7a9bb5; margin-bottom: 20px;">Enter password to access dashboard</p>
                <input type="password" id="password" placeholder="Enter password">
                <button onclick="login()">Login</button>
            </div>
        `;
    }
}

function login() {
    const pass = document.getElementById('password').value;
    if (pass === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_logged_in', 'true');
        checkAuth();
    } else {
        alert('❌ Wrong password!');
    }
}

function logout() {
    sessionStorage.removeItem('admin_logged_in');
    checkAuth();
}

function loadProjects() {
    const stored = localStorage.getItem('portfolio_projects');
    if (stored) {
        projects = JSON.parse(stored);
    } else {
        // Load default projects if none exist
        projects = [
            {
                id: 1,
                title: "✈️ Airline Analytics Pipeline",
                type: "featured",
                description: "Complete Modern Data Stack implementation: Amadeus API → Snowflake → dbt (8 models) → Airflow → Streamlit",
                tech: ["dbt", "Snowflake", "Airflow", "Python", "Streamlit"],
                github: "https://github.com/Ahmedsalah554/airline-analytics-dbt",
                demo: "#",
                image: "plane",
                businessImpact: "100% elimination of manual reporting, real-time visibility for executive decision-making"
            },
            {
                id: 2,
                title: "Airflow + dbt pipeline",
                type: "normal",
                description: "Reusable DAG that dynamically runs dbt models, handles dependencies, and alerts on failures. Used in production for daily refreshes.",
                tech: ["Airflow", "dbt", "Python"],
                github: "https://github.com/Ahmedsalah554/airflow-dbt-pipeline",
                demo: "#",
                image: "project-diagram",
                businessImpact: "90% reduction in workflow failures"
            },
            {
                id: 3,
                title: "Snowflake Cost Optimization Framework",
                type: "normal",
                description: "• Warehouse: Auto-suspend after 5min, scaling policies<br>• Queries: Clustering keys on 100M+ row tables<br>• Storage: Zero-copy cloning, time travel reduction",
                tech: ["Snowflake", "dbt", "Optimization"],
                github: "https://github.com/Ahmedsalah554/snowflake-optimizer",
                demo: "#",
                image: "snowflake",
                businessImpact: "$7,560 annual savings, 65% faster queries",
                costResult: "30% cost reduction ($2,100 → $1,470/month)"
            }
        ];
        saveProjects();
    }
    renderAdmin();
}

function saveProjects() {
    localStorage.setItem('portfolio_projects', JSON.stringify(projects));
    renderAdmin();
}

function showMessage(msg, isSuccess = true) {
    const msgDiv = document.getElementById('successMsg');
    if (msgDiv) {
        msgDiv.textContent = msg;
        msgDiv.style.background = isSuccess ? '#00cc88' : '#ff4444';
        msgDiv.classList.add('show');
        setTimeout(() => msgDiv.classList.remove('show'), 3000);
    } else {
        alert(msg);
    }
}

function renderAdmin() {
    const featuredCount = projects.filter(p => p.type === 'featured').length;
    const normalCount = projects.filter(p => p.type === 'normal').length;
    
    document.getElementById('adminContent').innerHTML = `
        <button onclick="logout()" style="background:#ff4444; color:white; margin-bottom: 20px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        
        <div class="stats">
            <div class="stat-card">
                <h3>${projects.length}</h3>
                <p>Total Projects</p>
            </div>
            <div class="stat-card">
                <h3>${featuredCount}</h3>
                <p>Featured Projects</p>
            </div>
            <div class="stat-card">
                <h3>${normalCount}</h3>
                <p>Normal Projects</p>
            </div>
        </div>
        
        <div id="successMsg" class="success-msg"></div>
        
        <div class="form-section">
            <h3><i class="fas fa-plus-circle"></i> Add New Project</h3>
            <form id="projectForm">
                <div class="form-group">
                    <label>Project Title *</label>
                    <input type="text" id="title" placeholder="e.g., Airline Analytics Pipeline" required>
                </div>
                
                <div class="form-group">
                    <label>Project Type *</label>
                    <select id="type">
                        <option value="normal">Normal Project</option>
                        <option value="featured">Featured Project (shows at top)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="description" rows="3" placeholder="Describe your project..." required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Technologies (comma separated) *</label>
                    <input type="text" id="tech" placeholder="dbt, Snowflake, Airflow, Python" required>
                </div>
                
                <div class="form-group">
                    <label>GitHub URL</label>
                    <input type="url" id="github" placeholder="https://github.com/username/repo">
                </div>
                
                <div class="form-group">
                    <label>Demo URL (optional)</label>
                    <input type="url" id="demo" placeholder="https://your-demo-link.com">
                </div>
                
                <div class="form-group">
                    <label>Icon/FontAwesome Name *</label>
                    <input type="text" id="image" placeholder="plane, snowflake, code-branch, project-diagram" value="code">
                    <small style="color: #7a9bb5;">Use Font Awesome icon names (e.g., plane, snowflake, database)</small>
                </div>
                
                <div class="form-group">
                    <label>Business Impact *</label>
                    <textarea id="businessImpact" rows="2" placeholder="e.g., 100% elimination of manual reporting" required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Cost Result (optional, for Snowflake projects)</label>
                    <input type="text" id="costResult" placeholder="e.g., 30% cost reduction ($2,100 → $1,470/month)">
                </div>
                
                <button type="submit"><i class="fas fa-save"></i> Add Project</button>
                <button type="button" onclick="resetForm()" style="background: #555;"><i class="fas fa-undo"></i> Reset</button>
            </form>
        </div>
        
        <h3><i class="fas fa-folder-open"></i> Your Projects (${projects.length})</h3>
        <div id="projectsList"></div>
    `;
    
    renderProjectsList();
    
    document.getElementById('projectForm').addEventListener('submit', (e) => {
        e.preventDefault();
        addProject();
    });
}

function renderProjectsList() {
    const container = document.getElementById('projectsList');
    if (projects.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #7a9bb5;">No projects yet. Add your first project above!</p>';
        return;
    }
    
    container.innerHTML = projects.map(project => `
        <div class="project-card">
            <div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap;">
                <div style="flex: 1;">
                    <h3 style="margin-bottom: 10px;">${project.title}</h3>
                    <p><strong style="color: #00e6ff;">Type:</strong> ${project.type === 'featured' ? '⭐ Featured' : '📄 Normal'}</p>
                    <p><strong style="color: #00e6ff;">Tech:</strong> ${project.tech.join(', ')}</p>
                    <p><strong style="color: #00e6ff;">Impact:</strong> ${project.businessImpact}</p>
                    ${project.costResult ? `<p><strong style="color: #00e6ff;">Cost Result:</strong> ${project.costResult}</p>` : ''}
                    <div style="margin-top: 15px;">
                        ${project.github !== '#' && project.github ? `<a href="${project.github}" target="_blank" style="color: #00e6ff; margin-right: 15px;"><i class="fab fa-github"></i> GitHub</a>` : ''}
                        ${project.demo !== '#' && project.demo ? `<a href="${project.demo}" target="_blank" style="color: #00e6ff;"><i class="fas fa-external-link-alt"></i> Demo</a>` : ''}
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="edit-btn" onclick="editProject(${project.id})"><i class="fas fa-edit"></i> Edit</button>
                    <button class="delete-btn" onclick="deleteProject(${project.id})"><i class="fas fa-trash"></i> Delete</button>
                </div>
            </div>
        </div>
    `).join('');
}

function resetForm() {
    document.getElementById('projectForm').reset();
    document.getElementById('type').value = 'normal';
    document.getElementById('image').value = 'code';
    showMessage('Form reset!', true);
}

function addProject() {
    const techInput = document.getElementById('tech').value;
    if (!techInput.trim()) {
        showMessage('Please enter at least one technology!', false);
        return;
    }
    
    const newProject = {
        id: Date.now(),
        title: document.getElementById('title').value,
        type: document.getElementById('type').value,
        description: document.getElementById('description').value,
        tech: document.getElementById('tech').value.split(',').map(t => t.trim()).filter(t => t),
        github: document.getElementById('github').value || '#',
        demo: document.getElementById('demo').value || '#',
        image: document.getElementById('image').value || 'code',
        businessImpact: document.getElementById('businessImpact').value,
        costResult: document.getElementById('costResult').value || null
    };
    
    if (!newProject.title || !newProject.description || !newProject.businessImpact) {
        showMessage('Please fill in all required fields!', false);
        return;
    }
    
    projects.push(newProject);
    saveProjects();
    document.getElementById('projectForm').reset();
    document.getElementById('type').value = 'normal';
    document.getElementById('image').value = 'code';
    showMessage('✅ Project added successfully!', true);
}

function editProject(id) {
    const project = projects.find(p => p.id === id);
    if (!project) return;
    
    document.getElementById('title').value = project.title;
    document.getElementById('type').value = project.type;
    document.getElementById('description').value = project.description;
    document.getElementById('tech').value = project.tech.join(', ');
    document.getElementById('github').value = project.github;
    document.getElementById('demo').value = project.demo;
    document.getElementById('image').value = project.image;
    document.getElementById('businessImpact').value = project.businessImpact;
    document.getElementById('costResult').value = project.costResult || '';
    
    deleteProject(id, false);
    showMessage('✏️ Edit the details and click Add Project to save changes.', true);
}

function deleteProject(id, confirmMsg = true) {
    if (confirmMsg && !confirm('Are you sure you want to delete this project?')) return;
    projects = projects.filter(p => p.id !== id);
    saveProjects();
    if (confirmMsg) showMessage('🗑️ Project deleted successfully!', true);
}

checkAuth();
</script>
</body>
</html>
